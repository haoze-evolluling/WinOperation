    <div id="tab-network" class="tab-content">
      <div class="section-head">
        <h2>网络设置</h2>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Adapter</span>
          <h3>网络适配器</h3>
          <button id="net-refresh-btn" class="btn btn-sm btn-secondary" style="margin-left:auto;">刷新</button>
        </div>
        <div class="card-body">
          <select id="adapter-select"><option value="">加载中...</option></select>
          <div class="adapter-loading-bar" id="adapter-loading-bar"><div class="adapter-loading-fill" id="adapter-loading-fill"></div></div>
          <div id="net-info" class="net-info-panel"></div>
        </div>
      </div>

      <div class="card" id="wifi-section">
        <div class="card-header">
          <span class="card-number">WiFi</span>
          <h3>WiFi 控制</h3>
        </div>
        <div class="card-body">
          <div class="btn-row">
            <button id="wifi-enable" class="btn btn-primary">启用 WiFi</button>
            <button id="wifi-disable" class="btn btn-danger">禁用 WiFi</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">DNS</span>
          <h3>DNS 设置</h3>
        </div>
        <div class="card-body">
          <div class="dns-protocol-toggle">
            <span class="protocol-label">协议类型：</span>
            <label class="protocol-option active">
              <input type="radio" name="dns-protocol" value="v4" checked> IPv4
            </label>
            <label class="protocol-option">
              <input type="radio" name="dns-protocol" value="v6"> IPv6
            </label>
          </div>

          <div class="dns-group">
            <div class="dns-group-title">国内 DNS</div>
            <div class="dns-presets">
              <button class="dns-tag" data-dns-v4="223.5.5.5,223.6.6.6" data-dns-v6="2400:3200::1,2400:3200:baba::1">阿里</button>
              <button class="dns-tag" data-dns-v4="114.114.114.114,114.114.115.115" data-dns-v6="240c::6666,240c::6644">114DNS</button>
              <button class="dns-tag" data-dns-v4="119.29.29.29,119.28.28.28" data-dns-v6="2402:4e00::,2402:4e00:1::">DNSPod</button>
              <button class="dns-tag" data-dns-v4="180.76.76.76,180.76.77.77" data-dns-v6="2400:da00::6666,">百度</button>
            </div>
          </div>

          <div class="dns-group">
            <div class="dns-group-title">国外 DNS</div>
            <div class="dns-presets">
              <button class="dns-tag" data-dns-v4="8.8.8.8,8.8.4.4" data-dns-v6="2001:4860:4860::8888,2001:4860:4860::8844">Google</button>
              <button class="dns-tag" data-dns-v4="1.1.1.1,1.0.0.1" data-dns-v6="2606:4700:4700::1111,2606:4700:4700::1001">Cloudflare</button>
              <button class="dns-tag" data-dns-v4="9.9.9.9,149.112.112.112" data-dns-v6="2620:fe::fe,2620:fe::9">Quad9</button>
            </div>
          </div>

          <div class="dns-input-group">
            <div class="dns-fields">
              <input type="text" id="dns1" placeholder="首选 DNS">
              <input type="text" id="dns2" placeholder="备选 DNS">
            </div>
            <div class="dns-actions">
              <button id="dns-apply" class="btn btn-sm btn-primary">应用</button>
              <button id="dns-auto" class="btn btn-sm btn-secondary">自动获取</button>
              <button id="flush-dns" class="btn btn-sm btn-secondary">清除 DNS 缓存</button>
            </div>
          </div>
        </div>
      </div>
    </div>
