    <!-- ====== APP UNINSTALL TAB ====== -->
    <div id="tab-app-uninstall" class="tab-content">
      <div class="section-head">
        <h2>应用卸载</h2>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Uninstall</span>
          <h3>卸载系统自带应用</h3>
        </div>
        <div class="card-body">
          <div class="app-catalog-toolbar">
            <div class="module-metric-grid app-catalog-stats">
              <div class="module-metric"><span>分类</span><strong id="app-catalog-category-count">-</strong></div>
              <div class="module-metric"><span>应用项</span><strong id="app-catalog-item-count">-</strong></div>
              <div class="module-metric"><span>匹配</span><strong id="app-catalog-match-count">-</strong></div>
            </div>
            <input type="search" id="app-uninstall-search" class="module-search" placeholder="搜索应用名称或分类">
          </div>
          <div class="quick-grid" id="app-uninstall-grid"></div>
        </div>
      </div>
    </div>
