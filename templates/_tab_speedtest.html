    <div id="tab-speedtest" class="tab-content">
      <div class="section-head">
        <h2>网站测速</h2>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Resolve</span>
          <h3>DNS 解析测速</h3>
        </div>
        <div class="card-body">
          <div class="module-inline-form">
            <input type="text" id="resolve-target" placeholder="输入域名，例如 github.com" value="github.com">
            <button id="resolve-run-btn" class="btn btn-sm btn-primary">解析测速</button>
          </div>
          <div id="resolve-result" class="module-result-panel">
            <div class="empty-hint">使用 Python socket 解析域名，展示解析耗时与 IPv4/IPv6 结果。</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Batch</span>
          <h3>批量测速</h3>
        </div>
        <div class="card-body">
          <div class="speedtest-toolbar">
            <button id="speedtest-start" class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 开始测速</button>
            <div class="speedtest-progress" id="speedtest-progress">
              <div class="speedtest-progress-track">
                <div class="speedtest-progress-bar" id="speedtest-progress-bar"></div>
              </div>
              <span class="speedtest-progress-text" id="speedtest-progress-text">正在测速 <span id="speedtest-counter">0/40</span></span>
            </div>
          </div>

          <div class="speedtest-tabs">
            <button class="speedtest-tab active" data-group="all">全部 <span class="tab-count" id="count-all">40</span></button>
            <button class="speedtest-tab" data-group="domestic">国内网站 <span class="tab-count" id="count-domestic">20</span></button>
            <button class="speedtest-tab" data-group="foreign">国外网站 <span class="tab-count" id="count-foreign">20</span></button>
          </div>

          <div class="table-wrap">
            <table class="data-table" id="speedtest-table">
              <thead>
                <tr>
                  <th>区域</th>
                  <th>网站名称</th>
                  <th>域名</th>
                  <th>IP 地址</th>
                  <th>延迟 <span class="th-sub">最小/平均/最大</span></th>
                  <th>丢包率</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="speedtest-tbody">
                <tr><td colspan="7" class="empty-hint"><span class="empty-icon">⏱</span> 点击上方「开始测速」按钮测试所有网站</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Custom</span>
          <h3>自定义测试</h3>
        </div>
        <div class="card-body">
          <div class="dns-input-group single-row">
            <input type="text" id="custom-target" placeholder="输入 IP 或域名，例如: www.example.com">
            <div class="dns-actions">
              <button id="custom-ping-btn" class="btn btn-sm btn-primary">Ping</button>
              <button id="custom-nslookup-btn" class="btn btn-sm btn-secondary">Nslookup</button>
            </div>
          </div>
          <div id="custom-result" style="display:none;">
            <div class="divider"></div>
            <div id="custom-result-content" class="custom-result-grid">
              <div id="custom-result-nslookup" class="result-card" style="display:none;">
                <div class="result-card-header">Nslookup 解析结果</div>
                <div class="result-card-body" id="nslookup-body"></div>
              </div>
              <div id="custom-result-ping" class="result-card" style="display:none;">
                <div class="result-card-header">Ping 连通性测试结果</div>
                <div class="result-card-body" id="ping-body"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
