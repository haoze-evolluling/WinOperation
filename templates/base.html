<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WinOperation</title>
  <link rel="icon" href="/static/logo.ico">
  <script>
    (function() {
      var theme = null;
      try { theme = localStorage.getItem('winoperation-theme'); } catch(e) {}
      if (theme !== 'dark' && theme !== 'light') {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v=preview-singlecol-20260606">
</head>
<body>
  <div class="toast-container" id="toast-container"></div>
  {% block content %}{% endblock %}
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
