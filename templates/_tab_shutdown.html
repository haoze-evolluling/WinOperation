    <!-- ====== SHUTDOWN TAB ====== -->
    <div id="tab-shutdown" class="tab-content">
      <div class="section-head">
        <h2>定时关机</h2>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Status</span>
          <h3>当前状态</h3>
        </div>
        <div class="card-body text-center">
          <div class="status-indicator center" id="shutdown-status" style="margin-bottom:8px;"></div>
          <div class="timer-display" id="shutdown-timer-display">--:--:--</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Set</span>
          <h3>设置关机</h3>
        </div>
        <div class="card-body">
          <div class="mode-radio">
            <label><input type="radio" name="shutdown-mode" value="countdown" checked> 倒计时</label>
            <label><input type="radio" name="shutdown-mode" value="time"> 指定时间</label>
          </div>
          <div id="countdown-inputs" class="shutdown-inputs">
            <input type="number" id="shutdown-hours" placeholder="小时" min="0">
            <input type="number" id="shutdown-mins" placeholder="分钟" min="1">
          </div>
          <div id="time-input" class="shutdown-inputs" style="display:none;">
            <input type="time" id="shutdown-time">
          </div>
          <div class="form-footer">
            <div class="form-actions">
              <button id="shutdown-start" class="btn btn-primary">开始关机</button>
              <button id="shutdown-cancel" class="btn btn-danger">取消关机</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-number">Plan</span>
          <h3>重复计划</h3>
        </div>
        <div class="card-body">
          <div class="schedule-days" id="schedule-days">
            <label><input type="checkbox" value="Monday"> 周一</label>
            <label><input type="checkbox" value="Tuesday"> 周二</label>
            <label><input type="checkbox" value="Wednesday"> 周三</label>
            <label><input type="checkbox" value="Thursday"> 周四</label>
            <label><input type="checkbox" value="Friday"> 周五</label>
            <label><input type="checkbox" value="Saturday"> 周六</label>
            <label><input type="checkbox" value="Sunday"> 周日</label>
          </div>
          <div class="form-row">
            <input type="time" id="schedule-time" style="flex:none;width:140px;">
            <div class="form-actions" style="flex:1;">
              <button id="schedule-create" class="btn btn-primary">创建计划</button>
            </div>
          </div>
          <div id="schedule-list"></div>
        </div>
      </div>
    </div>
